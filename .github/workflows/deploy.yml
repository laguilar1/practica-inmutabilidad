name: CI/CD Pipeline Inmutable

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del commit actual
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Autenticarse en Docker Hub usando los secretos
    - name: Autenticación en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Construir y subir la imagen con la etiqueta inmutable (SHA del commit)
    - name: Construir y Subir Imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Aquí está el truco: usamos el hash del commit para que sea única e inmutable
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/practica-inmutabilidad:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/practica-inmutabilidad:latest